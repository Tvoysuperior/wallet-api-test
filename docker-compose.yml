
services:
  postgres:
    image: postgres:15
    container_name: wallet-api-test-postgres
    environment:
      POSTGRES_DB: api_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d api_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: wallet-api-test-app
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_PORT: 5432
      DB_NAME: api_test
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/api_test
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      sh -c "sleep 5 &&
             alembic upgrade head &&
             python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:




